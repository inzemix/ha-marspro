<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="grd">
      <stop offset="0%" stop-color="#1e3a1e"/>
      <stop offset="100%" stop-color="#0a120a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grd)" stroke="#2d5a2d" stroke-width="3"/>
  
  <!-- Tech ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15" stroke-dasharray="8 6"/>
  
  <!-- Stem -->
  <path d="M128 188 Q132 142 130 98" fill="none" stroke="#4ade80" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Left leaf (teardrop) -->
  <path d="M130 112 C106 116 80 98 80 80 C80 68 92 60 108 62 C120 64 132 76 130 90 Z" fill="#22c55e" stroke="#4ade80" stroke-width="1" opacity="0.9"/>
  
  <!-- Right leaf -->
  <path d="M130 102 C152 104 174 90 176 74 C176 62 162 54 148 58 C136 62 126 76 130 90 Z" fill="#16a34a" stroke="#4ade80" stroke-width="1" opacity="0.9"/>
  
  <!-- Top bud -->
  <circle cx="130" cy="73" r="8" fill="#4ade80" filter="url(#glow)"/>
  
  <!-- WiFi arc 1 -->
  <path d="M85 50 Q128 32 171 50" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- WiFi arc 2 -->
  <path d="M98 38 Q128 22 158 38" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Drop shadow -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="#000" stroke-width="4" opacity="0.1" transform="translate(0, 3)"/>
</svg>